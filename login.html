<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AmazonWorld | Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="landing">
    <section class="landing-card">
      <h1>Login to AmazonWorld</h1>
      <p class="muted">Login with your registered email and password.</p>
      <form id="loginForm" class="form">
        <input id="loginEmail" class="input" type="email" placeholder="Enter your email" required />
        <input id="loginPassword" class="input" type="password" placeholder="Enter your password" required />
        <button class="btn primary" type="submit">Login</button>
      </form>
      <p class="muted" style="margin-top: 1rem;">
        New here?
        <a href="signup.html" style="color:#1a73e8;font-weight:700;">Create an account</a>
      </p>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
