<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AmazonWorld | Contact</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-auth="required">
  <header class="site-header">
    <div class="topbar">
      <div class="brand">Amazon<span>World</span></div>
      <nav class="nav">
        <a href="home.html">Home</a>
        <a href="record.html">Record</a>
        <a href="start.html">Start</a>
        <a class="active" href="contact.html">Contact</a>
        <a href="profile-dashboard.html">Profile</a>
        <span class="badge">Cart: <span id="cartCount">0</span></span>
        <button id="logoutBtn" class="btn small danger">Logout</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="panel">
      <h1>Contact & Support</h1>
      <p class="muted">Reach our team for product, payment, or delivery help.</p>
      <form class="form" style="margin-top: 1rem;">
        <input class="input" type="text" placeholder="Your full name" />
        <input class="input" type="email" placeholder="Your email" />
        <input class="input" type="text" placeholder="Subject" />
        <textarea class="input" rows="4" placeholder="Your message"></textarea>
        <button class="btn primary" type="button">Send Message</button>
      </form>
      <p class="notice">Support is active 24/7 for buyers and sellers.</p>
    </section>

    <section class="panel">
      <h2>Quick Contact Features</h2>
      <div class="list">
        <div class="list-item"><span>Live chat</span><span class="badge">Online</span></div>
        <div class="list-item"><span>Email support</span><span>support@amazonworld.local</span></div>
        <div class="list-item"><span>Helpline</span><span>+92 300 1234567</span></div>
      </div>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
